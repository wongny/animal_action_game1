<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動物動作互動問答遊戲</title>
    <style>
        :root {
            --primary: #FF8C42;
            --success: #4CAF50;
            --error: #EF5350;
            --info: #3498db;
            --bg: #f0f8ff;
            --text: #2c3e50;
            --font-kai: 'BiauKai', 'DFKai-SB', 'Kaiti TC', 'Kaiti', 'STKaiti', serif;
        }

        body {
            font-family: var(--font-kai);
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        button, input, select, textarea { font-family: inherit; }

        .page {
            display: none;
            width: 100%;
            max-width: 900px;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.5s;
        }
        .page.active { display: flex; }

        .cover-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 5vh;
            border: 5px dashed var(--primary);
        }
        .cover-title {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #FFE0B2;
            font-weight: bold;
        }
        .cover-img {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: #FFF0F5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
        }
        .btn-large {
            background: var(--success);
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #2E7D32;
            transition: all 0.2s;
            animation: pulse 1.5s infinite;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: var(--info);
            font-size: 24px;
        }
        .progress-bar-bg { width: 150px; height: 15px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }

        .question-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .question-box {
            background: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 32px;
            font-weight: bold;
            color: #34495e;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 4px solid #FFD166;
            text-align: center;
            flex-grow: 1;
        }
        
        .btn-mic {
            background: #9b59b6;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #8e44ad;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-mic.listening { background: #e74c3c; box-shadow: 0 6px 0 #c0392b; animation: pulse-mic 1s infinite; }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) { .action-grid { grid-template-columns: repeat(4, 1fr); } }
        .action-card {
            background: white;
            border: 4px solid #e2e8f0;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1;
        }

        .btn-hint {
            background: var(--info);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2980b9;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .answer-section {
            width: 100%;
            display: none;
            animation: slideDownFade 0.5s ease forwards;
        }
        .divider {
            width: 100%;
            height: 4px;
            background-color: #e2e8f0;
            border-radius: 2px;
            margin: 10px 0 20px 0;
            position: relative;
        }
        .divider::after {
            content: '請選擇或讀出邊隻動物：';
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: var(--bg); padding: 0 15px;
            font-size: 24px; font-weight: bold; color: #7f8c8d;
        }
        .answer-area {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px;
        }
        .answer-card {
            background: white; border: 4px solid #bdc3c7; border-radius: 20px;
            width: 100px; height: 100px; padding: 10px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }
        @media (min-width: 768px) { .answer-card { width: 130px; height: 130px; } }
        .answer-card.correct { border-color: var(--success); background-color: #e8f5e9; animation: bounce 0.5s; }
        .answer-card.wrong { border-color: var(--error); background-color: #ffebee; animation: shake 0.5s; }
        .answer-card.disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.5); }

        .btn-next {
            background: var(--success); color: white; padding: 15px 40px;
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 6px 0 #2E7D32; display: none; font-size: 30px; font-weight: bold;
        }

        .message-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.95); padding: 30px 60px; border-radius: 30px;
            font-size: 42px; font-weight: bold; z-index: 1000; text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .message-overlay.show { transform: translate(-50%, -50%) scale(1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes slideDownFade { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .confetti { position: fixed; width: 15px; height: 15px; opacity: 0; z-index: 999; pointer-events: none; }
    </style>
</head>
<body>

    <div id="coverPage" class="page active">
        <div class="cover-container">
            <div class="cover-img">🦁</div>
            <h1 class="cover-title">動物動作互動問答</h1>
            <p style="font-size: 26px; color: #7f8c8d; margin-bottom: 30px; font-weight: bold;">
                聽問題，搵出啱嘅動物！<br>
                讀出動物名，或者答錯兩次就有圖睇喇！
            </p>
            <button class="btn-large" onclick="startGame()">▶️ 開始遊戲</button>
        </div>
    </div>

    <div id="gamePage" class="page">
        <div class="header">
            <h1>🐾 搵動物遊戲</h1>
            <div class="progress-container">
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
                <span id="scoreText">0 / 10</span>
            </div>
        </div>

        <div class="question-wrapper">
            <div class="question-box" id="questionBox">
                邊個喺度 <span style="color:#E74C3C; font-size:38px; text-decoration:underline;" id="actionText">...</span> 呀？
            </div>
            <button class="btn-mic" id="micBtn" onclick="toggleListening()">🎤</button>
        </div>

        <div class="action-grid" id="actionCardsContainer"></div>

        <div style="display: flex; justify-content: center; width: 100%; margin-bottom: 20px;" id="showHintArea">
            <button class="btn-hint" onclick="revealAnswers()">💡 提示</button>
        </div>

        <div class="answer-section" id="answerSection">
            <div class="divider"></div>
            <div class="answer-area" id="answerCardsContainer"></div>
        </div>

        <div style="display: flex; justify-content: center; width: 100%; margin-bottom: 30px;">
            <button class="btn-next" id="nextBtn" onclick="initRound()">🌟 下一題 🌟</button>
        </div>
    </div>

    <div id="winPage" class="page">
        <div class="cover-container" style="border-color: var(--success);">
            <div class="cover-img" style="background: #E8F5E9;">🏆</div>
            <h1 class="cover-title" style="color: var(--success);">恭喜過關！</h1>
            <p style="font-size: 32px; font-weight: bold; color: #34495e; margin-bottom: 30px;">你好叻呀！</p>
            <button class="btn-large" onclick="resetGame()">🔄 再玩一次</button>
        </div>
    </div>

    <div class="message-overlay" id="messageOverlay"></div>

    <script>
        const animals = {
            'bear': { name: '小熊', keywords: ['熊', 'bear'], color: '#C68B59', bg: '#E8F4F8', ears: `<circle cx="65" cy="55" r="18" fill="#C68B59"/><circle cx="135" cy="55" r="18" fill="#C68B59"/>` },
            'cat': { name: '小貓', keywords: ['貓', 'cat'], color: '#F9B233', bg: '#F3F8E8', ears: `<polygon points="50,70 65,30 85,60" fill="#F9B233"/><polygon points="150,70 135,30 115,60" fill="#F9B233"/>` },
            'rabbit': { name: '小兔', keywords: ['兔', 'rabbit'], color: '#FFFFFF', bg: '#FFF0F5', ears: `<ellipse cx="75" cy="40" rx="12" ry="35" fill="#FFFFFF" transform="rotate(-15 75 40)"/><ellipse cx="125" cy="40" rx="12" ry="35" fill="#FFFFFF" transform="rotate(15 125 40)"/>` },
            'frog': { name: '青蛙', keywords: ['蛙', 'frog', '青蛙'], color: '#81C784', bg: '#FFFDE7', ears: `<circle cx="70" cy="65" r="18" fill="#81C784"/><circle cx="130" cy="65" r="18" fill="#81C784"/>`, isFrog: true }
        };

        const actions = {
            'drink': { text: '飲水' }, 'eat_apple': { text: '食蘋果' }, 'sleep': { text: '瞓覺' },
            'read_book': { text: '睇書' }, 'play_ball': { text: '玩波' }, 'bath': { text: '沖涼' },
            'brush_teeth': { text: '刷牙' }, 'car': { text: '揸車' }
        };

        let currentScore = 0;
        let targetAnimalKey = '';   
        let isAnsweredCorrectly = false; 
        let wrongCount = 0; // 新增：紀錄答錯次數

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-HK';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = (Recognition) ? new Recognition() : null;
        if (recognition) {
            recognition.lang = 'yue-Hant-HK';
            recognition.onresult = (e) => checkVoiceAnswer(e.results[0][0].transcript);
            recognition.onend = () => document.getElementById('micBtn').classList.remove('listening');
        }

        function toggleListening() {
            if (!recognition) return alert("不支援語音辨識");
            document.getElementById('micBtn').classList.add('listening');
            recognition.start();
        }

        function startGame() { switchPage('gamePage'); currentScore = 0; updateProgress(); initRound(); }
        function resetGame() { switchPage('coverPage'); }
        function switchPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function updateProgress() { document.getElementById('scoreText').textContent = `${currentScore} / 10`; document.getElementById('progressBar').style.width = `${(currentScore/10)*100}%`; }

        function initRound() {
            isAnsweredCorrectly = false;
            wrongCount = 0; // 重置答錯次數
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('answerSection').style.display = 'none';
            document.getElementById('showHintArea').style.display = 'flex';

            const keys = Object.keys(animals);
            const acts = Object.keys(actions);
            const selA = shuffle([...keys]).slice(0, 4);
            const selT = shuffle([...acts]).slice(0, 4);
            const roundData = selA.map((a, i) => ({ animal: a, action: selT[i] }));
            const targetIdx = Math.floor(Math.random() * 4);
            targetAnimalKey = roundData[targetIdx].animal;

            document.getElementById('actionText').textContent = actions[roundData[targetIdx].action].text;
            speakText(`邊個喺度 ${actions[roundData[targetIdx].action].text} 呀？`);

            const container = document.getElementById('actionCardsContainer');
            container.innerHTML = '';
            roundData.forEach(d => {
                const div = document.createElement('div');
                div.className = 'action-card';
                div.innerHTML = generateSVG(d.animal, d.action);
                container.appendChild(div);
            });

            const ansContainer = document.getElementById('answerCardsContainer');
            ansContainer.innerHTML = '';
            shuffle([...selA]).forEach(k => {
                const div = document.createElement('div');
                div.className = 'answer-card';
                div.id = `answer-${k}`;
                div.innerHTML = generateSVG(k, 'portrait');
                div.onclick = () => checkAnswer(k);
                ansContainer.appendChild(div);
            });
        }

        function checkVoiceAnswer(transcript) {
            if (isAnsweredCorrectly) return;
            if (animals[targetAnimalKey].keywords.some(kw => transcript.includes(kw))) {
                revealAnswers();
                checkAnswer(targetAnimalKey);
            } else {
                let matchedOther = false;
                for (let k in animals) {
                    if (k !== targetAnimalKey && animals[k].keywords.some(kw => transcript.includes(kw))) {
                        handleWrongAnswer(); // 改為呼叫統一處理錯誤的邏輯
                        matchedOther = true; break;
                    }
                }
                if (!matchedOther) speakText('聽唔清楚，再講一次吖');
            }
        }

        function revealAnswers() {
            document.getElementById('showHintArea').style.display = 'none';
            document.getElementById('answerSection').style.display = 'block';
        }

        function checkAnswer(k) {
            if (isAnsweredCorrectly) return;
            if (k === targetAnimalKey) {
                isAnsweredCorrectly = true;
                const el = document.getElementById(`answer-${k}`);
                if (el) el.classList.add('correct');
                currentScore++;
                updateProgress();
                if (currentScore >= 10) {
                    showMessage('🎉 答啱喇！好叻呀！', '#4CAF50');
                    speakText('答啱喇！好叻呀！恭喜你過關喇！你真係好叻！');
                    setTimeout(() => switchPage('winPage'), 4000);
                } else {
                    showMessage('🎉 答啱喇！好叻呀！', '#4CAF50');
                    speakText('答啱喇！好叻呀！');
                    document.getElementById('nextBtn').style.display = 'block';
                }
            } else {
                handleWrongAnswer(k);
            }
        }

        // 核心邏輯：處理答錯
        function handleWrongAnswer(k) {
            wrongCount++;
            const el = k ? document.getElementById(`answer-${k}`) : null;
            if (el) {
                el.classList.add('wrong');
                setTimeout(() => el.classList.remove('wrong'), 500);
            }

            showMessage('❌ 唔係佢喎，再試吓啦！', '#EF5350');
            speakText('唔係佢喎，再試吓啦！');

            // 如果已經錯了兩次（或更多），自動彈出選項
            if (wrongCount >= 2) {
                setTimeout(revealAnswers, 800);
            }
        }

        function showMessage(t, c) {
            const o = document.getElementById('messageOverlay');
            o.textContent = t; o.style.color = c; o.classList.add('show');
            setTimeout(() => o.classList.remove('show'), 1500);
        }

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

        function generateSVG(animalKey, actKey) {
            const animal = animals[animalKey];
            const isFrog = animal.isFrog || false;
            let content = animal.ears + `<circle cx="100" cy="90" r="40" fill="${animal.color}"/>`;
            
            // 簡化版面部/動作內容
            if (isFrog) {
                content += `<circle cx="70" cy="65" r="10" fill="white"/><circle cx="70" cy="65" r="4" fill="black"/><circle cx="130" cy="65" r="10" fill="white"/><circle cx="130" cy="65" r="4" fill="black"/><path d="M 85 95 Q 100 105 115 95" fill="none" stroke="green" stroke-width="3"/>`;
            } else {
                content += `<circle cx="82" cy="90" r="4" fill="#3E2723"/><circle cx="118" cy="90" r="4" fill="#3E2723"/><path d="M 92 105 Q 100 112 108 105" fill="none" stroke="#3E2723" stroke-width="2"/>`;
            }

            // 加入動作指示器（簡單符號代表動作）
            if (actKey !== 'portrait') {
                content += `<rect x="65" y="100" width="70" height="60" rx="30" fill="${animal.color}" opacity="0.6"/>`;
                if (actKey === 'eat_apple') content += `<circle cx="140" cy="110" r="15" fill="red"/>`;
                if (actKey === 'drink') content += `<rect x="130" y="100" width="20" height="25" fill="blue"/>`;
                if (actKey === 'sleep') content += `<text x="140" y="80" font-size="20">Zzz</text>`;
            }

            return `<svg viewBox="0 0 200 200" width="100%" height="100%"><circle cx="100" cy="100" r="95" fill="${animal.bg}"/>${content}</svg>`;
        }
    </script>
</body>
</html>
